name: Deploy Laravel no EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  APP_DIR: /var/www/html/example-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Configurar SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${EC2_HOST}" ] || [ -z "${EC2_SSH_KEY}" ]; then
            echo "::error::Configure os secrets EC2_HOST e EC2_SSH_KEY em Settings > Secrets and variables > Actions."
            exit 1
          fi

          deploy_host="${EC2_HOST#ssh://}"
          deploy_user="${EC2_USER}"

          if [[ "${deploy_host}" == *@* ]]; then
            host_user="${deploy_host%@*}"
            deploy_host="${deploy_host#*@}"

            if [ -z "${deploy_user}" ]; then
              deploy_user="${host_user}"
            fi

            echo "::notice::EC2_HOST deve conter somente IP publico ou DNS. Remova o usuario do secret EC2_HOST e deixe o usuario no secret EC2_USER."
          fi

          deploy_host="${deploy_host%%/*}"

          if [ -z "${deploy_host}" ] || [ -z "${deploy_user}" ]; then
            echo "::error::Configure EC2_HOST com o IP/DNS publico e EC2_USER com o usuario SSH da instancia."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${EC2_SSH_KEY}" | tr -d '\r' > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

          if ! ssh-keyscan -T 20 -H "${deploy_host}" >> ~/.ssh/known_hosts; then
            echo "::error::Nao foi possivel acessar a porta 22 do EC2_HOST. Verifique se a instancia esta ligada, se EC2_HOST e publico, e se o Security Group libera SSH."
            exit 1
          fi

          {
            echo "DEPLOY_HOST=${deploy_host}"
            echo "DEPLOY_USER=${deploy_user}"
          } >> "$GITHUB_ENV"

      - name: Enviar arquivos para o EC2
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='storage/logs/*' \
            --exclude='storage/app/public/' \
            -e "ssh -i ~/.ssh/ec2_key" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${APP_DIR}/"

      - name: Rodar comandos do Laravel no EC2
        run: |
          ssh -i ~/.ssh/ec2_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd ${APP_DIR} && bash deploy/after-sync.sh"
